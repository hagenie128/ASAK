# 개인 Codex 설정 파일에 병합하는 예시입니다.
# <WORKSPACE>를 실제 절대 경로로 바꾸세요. 예: C:\\ASAK-workspace
# 이 파일과 개인 config.toml은 그대로 커밋하지 않습니다.

[mcp_servers.code-review-graph-admin]
command = "python"
args = ["-m", "code_review_graph", "serve"]
cwd = "<WORKSPACE>\\ASAK-Admin"
type = "stdio"

[mcp_servers.code-review-graph-kiosk]
command = "python"
args = ["-m", "code_review_graph", "serve"]
cwd = "<WORKSPACE>\\ASAK-Kiosk"
type = "stdio"

[mcp_servers.code-review-graph-back]
command = "python"
args = ["-m", "code_review_graph", "serve"]
cwd = "<WORKSPACE>\\ASAK-back"
type = "stdio"
